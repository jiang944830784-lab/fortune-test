<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <title>线上观音签</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&amp;family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f0e8;
            --bg-secondary: #ebe4d8;
            --text-primary: #4a4035;
            --text-secondary: #6b5d4d;
            --accent-gold: #c9a96e;
            --accent-dark-gold: #a08050;
            --ink-color: #3d3428;
            --border-color: #d4c8b5;
            --shadow-color: rgba(74, 64, 53, 0.15);
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: var(--bg-primary);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .zen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(200, 190, 170, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(210, 195, 175, 0.25) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 235, 220, 0.5) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            pointer-events: none;
        }

        .ink-splash {
            position: fixed;
            width: 100px;
            height: 100px;
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }
        .ink-splash:nth-child(1) { top: 10%; left: 5%; background: radial-gradient(circle, var(--ink-color) 0%, transparent 70%); }
        .ink-splash:nth-child(2) { top: 60%; right: 8%; background: radial-gradient(circle, var(--ink-color) 0%, transparent 65%); width: 80px; height: 80px; }
        .ink-splash:nth-child(3) { bottom: 15%; left: 15%; background: radial-gradient(circle, var(--ink-color) 0%, transparent 60%); width: 120px; height: 120px; }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .main-title {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: 2.2rem;
            color: var(--ink-color);
            letter-spacing: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            position: relative;
            display: inline-block;
        }

        .main-title::before,
        .main-title::after {
            content: '☸';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--accent-gold);
            opacity: 0.7;
        }
        .main-title::before { left: -30px; }
        .main-title::after { right: -30px; }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .deco-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: 15px auto;
        }

        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            animation: fadeIn 0.6s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-intro {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        .category-intro h2 {
            font-size: 1.3rem;
            color: var(--ink-color);
            margin-bottom: 10px;
        }

        .category-intro p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 10px;
        }

        .category-btn {
            background: linear-gradient(145deg, #faf7f0, #f0ebe0);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow-color);
            position: relative;
            overflow: hidden;
        }

        .category-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-dark-gold));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .category-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-color);
            border-color: var(--accent-gold);
        }

        .category-btn:hover::before {
            opacity: 1;
        }

        .category-btn:active {
            transform: translateY(-1px);
        }

        .category-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .category-name {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .shake-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .category-display {
            background: linear-gradient(135deg, #fff9f0, #f5efe5);
            border: 2px solid var(--accent-gold);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(201, 169, 110, 0.2);
        }

        .category-display span {
            font-size: 1.1rem;
            color: var(--ink-color);
        }

        .category-display .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .shake-wrapper {
            position: relative;
            margin: 20px 0;
        }

        .shake-btn {
            width: 200px;
            height: 280px;
            background: linear-gradient(180deg, #8b6914 0%, #6b4f10 50%, #4a3508 100%);
            border: none;
            border-radius: 20px 20px 25px 25px;
            cursor: pointer;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.3),
                inset 0 2px 10px rgba(255,255,255,0.1),
                inset 0 -5px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
            overflow: hidden;
        }

        .shake-btn::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 60px;
            background: linear-gradient(180deg, rgba(0,0,0,0.3), transparent);
            border-radius: 15px 15px 0 0;
        }

        .shake-btn.shaking {
            animation: shake 0.1s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-3deg) translateX(-2px); }
            50% { transform: rotate(3deg) translateX(2px); }
        }

        .sticks-container {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .mini-stick {
            width: 6px;
            height: 40px;
            background: linear-gradient(180deg, #f5e6c8, #e8d4a8, #d4c090);
            border-radius: 2px;
            opacity: 0.9;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .shake-btn.shaking .mini-stick {
            animation: stickBounce 0.15s ease-in-out infinite alternate;
        }

        .mini-stick:nth-child(1) { animation-delay: 0s; }
        .mini-stick:nth-child(2) { animation-delay: 0.03s; }
        .mini-stick:nth-child(3) { animation-delay: 0.06s; }
        .mini-stick:nth-child(4) { animation-delay: 0.09s; }
        .mini-stick:nth-child(5) { animation-delay: 0.12s; }

        @keyframes stickBounce {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-5px) rotate(5deg); }
        }

        .shake-hint {
            margin-top: 30px;
            font-size: 1rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .shake-hint .tap-icon {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .result-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .result-card {
            background: linear-gradient(145deg, #fffef8, #f8f4eb);
            border: 3px solid var(--accent-gold);
            border-radius: 25px;
            padding: 30px 25px;
            max-width: 100%;
            width: 100%;
            box-shadow: 
                0 10px 40px rgba(201, 169, 110, 0.25),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            position: relative;
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            border-radius: 0 0 10px 10px;
        }

        .result-number {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--accent-dark-gold);
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 5px;
        }

        .result-rank {
            text-align: center;
            font-size: 1rem;
            padding: 5px 20px;
            border-radius: 15px;
            margin: 0 auto 20px;
            display: inline-block;
        }

        .rank-shangshang { background: linear-gradient(135deg, #ffd700, #ffb347); color: #5d4200; }
        .rank-zhongshang { background: linear-gradient(135deg, #87ceeb, #98d8c8); color: #2d5a5a; }
        .rank-zhongping { background: linear-gradient(135deg, #dda0dd, #e6e6fa); color: #4a3060; }
        .rank-zhongxia { background: linear-gradient(135deg, #ffa07a, #ffb890); color: #6d3010; }
        .rank-xiaxia { background: linear-gradient(135deg, #b0c4de, #c9c9c9); color: #4a4a5a; }

        .result-poem {
            background: linear-gradient(135deg, #faf8f3, #f0ebe0);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }

        .result-poem p {
            font-size: 1.15rem;
            color: var(--ink-color);
            line-height: 2;
            letter-spacing: 2px;
        }

        .result-interpretation {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #fdfcfa, #f5f0e8);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .result-interpretation h4 {
            font-size: 1rem;
            color: var(--accent-dark-gold);
            margin-bottom: 10px;
            text-align: center;
        }

        .result-interpretation p {
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.8;
            text-align: justify;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-dark-gold));
            color: white;
            box-shadow: 0 4px 15px rgba(201, 169, 110, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 169, 110, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f5f0e8, #ebe4d8);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #ebe4d8, #e0d8c8);
        }

        .flying-stick {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 180px;
            background: linear-gradient(180deg, #f5e6c8, #e8d4a8, #d4c090);
            border-radius: 5px 5px 3px 3px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .flying-stick.visible {
            animation: flyOut 1s ease-out forwards;
        }

        @keyframes flyOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(0deg);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -100%) rotate(-10deg);
            }
            40% {
                transform: translate(-50%, -150%) rotate(10deg);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 100%) rotate(0deg);
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        @media (max-width: 380px) {
            .main-title { font-size: 1.8rem; letter-spacing: 5px; }
            .main-title::before, .main-title::after { display: none; }
            .category-grid { gap: 8px; }
            .category-btn { padding: 14px 8px; }
            .category-icon { font-size: 1.5rem; }
            .category-name { font-size: 0.9rem; }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(201, 169, 110, 0.4);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>

        let currentCategory = '';
        let currentResult = null;
        let isShaking = false;
        let shakeTimer = null;

        const screens = {
            category: document.getElementById('screen-category'),
            shake: document.getElementById('screen-shake'),
            result: document.getElementById('screen-result')
        };

        const elements = {
            selectedCategory: document.getElementById('selectedCategory'),
            shakeBtn: document.getElementById('shakeBtn'),
            resultCard: document.getElementById('resultCard'),
            btnRechoose: document.getElementById('btnRechoose'),
            btnAgain: document.getElementById('btnAgain'),
            flyingStick: document.getElementById('flyingStick')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                createRipple(e, this);
                currentCategory = this.dataset.category;
                elements.selectedCategory.textContent = currentCategory;
                showScreen('shake');
            });
        });

        function createRipple(event, element) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = event.clientX - rect.left - size / 2 + 'px';
            ripple.style.top = event.clientY - rect.top - size / 2 + 'px';
            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        elements.shakeBtn.addEventListener('click', function() {
            if (isShaking) return;
            isShaking = true;
            this.classList.add('shaking');
            const shakeDuration = 1000 + Math.random() * 2000;
            shakeTimer = setTimeout(() => stopShaking(), shakeDuration);
        });

        function stopShaking() {
            isShaking = false;
            elements.shakeBtn.classList.remove('shaking');
            if (shakeTimer) { clearTimeout(shakeTimer); shakeTimer = null; }
            showFlyingStick();
        }

        function showFlyingStick() {
            elements.flyingStick.classList.add('visible');
            setTimeout(() => {
                elements.flyingStick.classList.remove('visible');
                showResult();
            }, 1000);
        }

        function showResult() {
            const signNumber = Math.floor(Math.random() * 28) + 1;
            const signData = allDivineData[signNumber];
            const poem = signData.poems[currentCategory] || signData.poems["家宅"];
            currentResult = {
                number: signNumber,
                name: signData.name,
                rank: signData.rank,
                poem: poem,
                interpretation: signData.interpretation
            };
            renderResult(currentResult);
            showScreen('result');
        }

        function renderResult(result) {
            const rankClass = getRankClass(result.rank);
            elements.resultCard.innerHTML = `
                <div class="result-number">${result.name}</div>
                <div class="result-rank ${rankClass}">${result.rank}</div>
                <div class="result-poem">
                    <p>${result.poem}</p>
                </div>
                <div class="result-interpretation">
                    <h4>✨ 观音解签</h4>
                    <p>${result.interpretation}</p>
                </div>
            `;
        }

        function getRankClass(rank) {
            const rankMap = {
                '上上': 'rank-shangshang', '上': 'rank-shangshang',
                '中上': 'rank-zhongshang', '中': 'rank-zhongping',
                '中平': 'rank-zhongping', '中下': 'rank-zhongxia',
                '下': 'rank-xiaxia', '下下': 'rank-xiaxia', '下平': 'rank-xiaxia'
            };
            return rankMap[rank] || 'rank-zhongping';
        }

        elements.btnRechoose.addEventListener('click', function() {
            currentCategory = ''; currentResult = null;
            showScreen('category');
        });

        elements.btnAgain.addEventListener('click', function() {
            currentResult = null;
            showScreen('shake');
        });

        document.addEventListener('selectstart', function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'DIV') e.preventDefault();
        });

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

        showScreen('category');
    </script>


</body></html>
